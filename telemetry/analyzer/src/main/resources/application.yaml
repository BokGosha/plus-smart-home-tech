spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/smart_home
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  sql:
    init:
      mode: always

grpc:
  client:
    hub-router:
      address: 'static://localhost:59090'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

kafka:
  bootstrap-servers: localhost:9092
  consume-attempt-timeout-ms: 1000
  consumer:
    snapshot:
      topic: telemetry.snapshots.v1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.yandex.practicum.kafka.telemetry.deserializer.SensorsSnapshotAvroDeserializer
      group-id: snapshot
    hub-event:
      topic: telemetry.hubs.v1
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: ru.yandex.practicum.kafka.telemetry.deserializer.HubEventAvroDeserializer
      group-id: hub-event